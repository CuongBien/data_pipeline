services:
  # 1. Celery Worker: Thực thi các task
  worker:
    build:
      context: ..
      dockerfile: pipeline/Dockerfile
    image: pipeline-app:latest
    command: celery -A pipeline.celery_app worker --loglevel=info --concurrency=1
    restart: always
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MINIO_URL=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - CVAT_URL=${CVAT_URL:-http://172.16.0.252:8080}
      - DB_HOST=db
      - DB_NAME=traffic_db
      - DB_USER=admin
      - DB_PASSWORD=password123
      - MQTT_BROKER=mqtt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cvat_temp_data:/app/cvat_temp
      - ./model:/app/pipeline/model
      - ..:/app
    networks:
      - mlops_traffic_net

  # 2. Celery Beat: Lập lịch cho task
  beat:
    image: pipeline-app:latest
    command: celery -A pipeline.celery_app beat --loglevel=info
    restart: always
    depends_on:
      - worker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=db
      - DB_NAME=traffic_db
      - DB_USER=admin
      - DB_PASSWORD=password123
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mlops_traffic_net

  # 3. MQTT Listener: Nhận dữ liệu từ Jetson
  mqtt_listener:
    image: pipeline-app:latest
    command: python3 -m pipeline.services.mqtt_service
    restart: always
    environment:
      - MQTT_BROKER=mqtt
      - DB_HOST=db
      - DB_NAME=traffic_db
      - DB_USER=admin
      - DB_PASSWORD=password123
    depends_on:
      - beat
    volumes:
      - ..:/app
    networks:
      - mlops_traffic_net

volumes:
  cvat_temp_data:

networks:
  mlops_traffic_net:
    external: true
