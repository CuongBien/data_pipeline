# Network mlops_traffic_net phải tồn tại trước:
#   docker network create mlops_traffic_net
# Thứ tự: core-backbone up -d  ->  pipeline up -d --build

x-pipeline-app: &pipeline-app
  build:
    context: ..
    dockerfile: pipeline/Dockerfile
  image: pipeline-app:latest
  pull_policy: never

x-pipeline-env: &pipeline-env
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  MINIO_URL: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadminpassword
  DB_HOST: db
  DB_NAME: traffic_db
  DB_USER: admin
  DB_PASSWORD: password123
  MQTT_BROKER: mqtt
  CVAT_URL: ${CVAT_URL:-http://host.docker.internal:8080}
  CVAT_HOST_HEADER: 127.0.0.1
  CVAT_MINIO_ENDPOINT: http://core-backbone-minio-1:9000
  CVAT_CLOUD_STORAGE_ID: ${CVAT_CLOUD_STORAGE_ID:-5}
  CVAT_PROJECT_ID: ${CVAT_PROJECT_ID}

services:
  worker:
    <<: *pipeline-app
    command: celery -A pipeline.celery_app worker --loglevel=info --concurrency=1
    restart: always
    env_file:
      - ../../.env
    environment:
      <<: *pipeline-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cvat_temp_data:/app/cvat_temp
      - ./model:/app/pipeline/model
      - ..:/app
    networks:
      - mlops_traffic_net

  beat:
    <<: *pipeline-app
    command: celery -A pipeline.celery_app beat --loglevel=info
    restart: always
    depends_on:
      - worker
    env_file:
      - ../../.env
    environment:
      <<: *pipeline-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/app
    networks:
      - mlops_traffic_net

  mqtt_listener:
    <<: *pipeline-app
    command: python3 -m pipeline.services.mqtt_service
    restart: always
    depends_on:
      - worker
    env_file:
      - ../../.env
    environment:
      <<: *pipeline-env
    volumes:
      - ..:/app
    networks:
      - mlops_traffic_net

volumes:
  cvat_temp_data:

networks:
  mlops_traffic_net:
    external: true
