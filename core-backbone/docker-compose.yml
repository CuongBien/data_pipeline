services:
  # 1. Database lưu metadata
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: traffic_db
    ports:
      - "54321:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Object Storage lưu ảnh
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"

  # Tạo bucket MinIO lúc khởi động (CVAT Cloud Storage trỏ bucket raw-data).
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadminpassword; do sleep 2; done;
      mc mb --ignore-existing local/raw-data;
      mc mb --ignore-existing local/pseudo-labels;
      mc mb --ignore-existing local/archived-images;
      mc mb --ignore-existing local/archived-labels;
      mc mb --ignore-existing local/labeled-data;
      mc mb --ignore-existing local/base-dataset;
      mc mb --ignore-existing local/production-models;
      echo 'MinIO buckets ready';
      "

  # 3. Redis — Celery broker (pipeline: redis://redis:6379 trên mlops_traffic_net).
  # Không map ra host :6379 để tránh xung đột với container/process Redis cũ trên máy.
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # 3. MQTT Broker để nhận tin nhắn từ Edge
  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # 4. Subscriber Service (Xử lý dữ liệu và lưu vào DB)
  subscriber:
    build: .
    restart: always
    depends_on:
      - db
      - mqtt
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883

  # 5. MediaMTX - RTSP Server (Nhận luồng Video từ Jetson)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"  # RTSP
      - "1935:1935"  # RTMP
      - "8888:8888"  # HLS
      - "8889:8889"  # WebRTC
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_WEBRTCADDITIONALHOSTS=172.16.0.252

networks:
  default:
    name: mlops_traffic_net
    external: true